services:
  db:
    image: pgvector/pgvector:pg16
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: rado_fitness
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-localpassword}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rado_fitness"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
