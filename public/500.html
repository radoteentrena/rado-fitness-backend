<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>500 — Rado Te Entrena</title>
  <link rel="preconnect" href="https://api.fontshare.com">
  <link href="https://api.fontshare.com/v2/css?f[]=switzer@700,900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #040307;
      color: #F5F5F5;
      font-family: 'Switzer', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }
    .brand { font-size: 1.25rem; font-weight: 900; letter-spacing: -0.04em; text-transform: uppercase; margin-bottom: 3rem; }
    .brand span { color: #F5C228; }
    .code { font-size: clamp(6rem, 20vw, 10rem); font-weight: 900; line-height: 1; text-transform: uppercase; color: #2F2F2F; letter-spacing: -0.04em; }
    h1 { font-size: clamp(1.5rem, 4vw, 2.25rem); font-weight: 900; text-transform: uppercase; letter-spacing: -0.02em; margin: 1rem 0 0.75rem; }
    p { color: #888; font-size: 0.9375rem; margin-bottom: 2.5rem; max-width: 360px; line-height: 1.6; }
    a {
      display: inline-flex;
      border: 2px solid #F5C228;
      background: #F5C228;
      color: #040307;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      font-size: 0.8125rem;
      padding: 0.875rem 2.5rem;
      text-decoration: none;
      transition: transform 0.1s, box-shadow 0.1s;
    }
    a:hover { transform: translate(-2px, -2px); box-shadow: 6px 6px 0 0 #fff; }
  </style>
</head>
<body>
  <div class="brand">RADO<span>TE</span>ENTRENA</div>
  <div class="code">500</div>
  <h1>Algo salió mal</h1>
  <p>Hubo un error en el servidor. Ya estamos al tanto. Intentá de nuevo en unos minutos.</p>
  <a href="/">Volver al inicio</a>
</body>
</html>
